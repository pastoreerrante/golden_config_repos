! Command: show running-config
! device: ceos-01 (cEOSLab, EOS-4.32.0F-36401836.4320F (engineering build))
!
no aaa root
!
username admin privilege 15 role network-admin secret sha512 $6$mmPawCKpH/mw0p9a$GfaMqZFuloSE31oaV9xyG42Zz.Vj5e.U5xxRXpkrqgJa9d161.q8Q8ulFGqmynyrRs7MlisKtMa3C2asAoT501
!
transceiver qsfp default-mode 4x10G
!
service routing protocols model multi-agent
!
hostname ceos-01
!
spanning-tree mode mstp
!
system l1
   unsupported speed action error
   unsupported error-correction action error
!
management api http-commands
   no shutdown
!
management http-server
   protocol http
!
management api gnmi
   transport grpc default
!
management api netconf
   transport ssh default
!
interface Ethernet1
   description Connection to ceos-02
   no switchport
   ip address 10.10.10.1/30
   ip ospf network point-to-point
   ip ospf area 0.0.0.0
!
interface Ethernet2
   description Connection to ceos-04
   no switchport
   ip address 10.10.10.14/30
   ip ospf network point-to-point
   ip ospf area 0.0.0.0
!
interface Loopback0
   description Loopback for Router ID
   ip address 10.0.0.1/32
!
interface Loopback100
   description Mimic OSPF Area 0.0.0.2 loopback
   ip address 192.168.101.100/24
!
interface Management0
   ip address 172.17.0.2/16
!
ip routing
!
router ospf 1
   router-id 10.0.0.1
   max-lsa 12000
!
end
